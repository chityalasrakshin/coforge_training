<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Time table</title>
<style>
        body {
            font-family: serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }
        table {
            border-collapse: separate;
            border-spacing: 2px;
            border: 2px outset gray;
            background-color: white;
            width: 80%;
            max-width: 800px;
        }
        th, td {
            border: 1px inset gray;
            padding: 10px 15px;
            text-align: left;
        }
        th {
            text-align: center;
            font-weight: bold;
        }
        .center {
            text-align: center;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <th colspan="6">Time Table</th>
        </tr>
        <tr>
            <th rowspan="6" style="vertical-align: middle;">Hours</th>
            <th>Mon</th>
            <th>Tue</th>
            <th>Wed</th>
            <th>Thu</th>
            <th>Fri</th>
        </tr>
        <tr>
            <td>Science</td>
            <td>Maths</td>
            <td>Science</td>
            <td>Maths</td>
            <td>Arts</td>
        </tr>
        <tr>
            <td>Science</td>
            <td>Maths</td>
            <td>Science</td>
            <td>Maths</td>
            <td>Arts</td>
        </tr>
        <tr>
            <th colspan="5">LUNCH</th>
        </tr>
        <tr>
            <td>Science</td>
            <td>Maths</td>
            <td>Science</td>
            <td>Maths</td>
            <td rowspan="2" style="vertical-align: middle;">Project</td>
        </tr>
        <tr>
            <td>Science</td>
            <td>Maths</td>
            <td>Science</td>
            <td>Maths</td>
        </tr>
    </table>

</body>

</html>
