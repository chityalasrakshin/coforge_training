<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Grid System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: white;
        }
        .header-box {
            background-color: #4a7ebb;
            border-radius: 20px;
            padding: 20px;
            color: black;
            font-weight: 700;
        }
        .col-box-1 {
            background-color: #72af4b;
            border-radius: 30px;
            padding: 80px 20px;
            height: 100%;
            color: black;
            font-weight: 700;
        }
        .col-box-2 {
            background-color: #ed7d31;
            border-radius: 30px;
            padding: 80px 20px;
            height: 100%;
            color: black;
            font-weight: 700;
        }
        .col-box-3 {
            background-color: #ffc000;
            border-radius: 30px;
            padding: 80px 20px;
            height: 100%;
            color: black;
            font-weight: 700;
        }
        .footer-box {
            background-color: #71a6d2;
            border-radius: 10px;
            padding: 10px;
            color: black;
            font-weight: 700;
        }
        h1, h2, h3 {
            font-weight: 700;
            margin: 0;
        }
        h1 {
            font-size: 3rem;
        }
        h2 {
            font-size: 2.2rem;
        }
        h3 {
            font-size: 1.8rem;
        }
    </style>
</head>
<body>

    <div class="container text-center mt-5" style="max-width: 900px;">
        <!-- Header Row -->
        <div class="row mb-3">
            <div class="col-12">
                <div class="header-box shadow-sm">
                    <h1>Header</h1>
                </div>
            </div>
        </div>
        
        <!-- Three Columns Row -->
        <div class="row mb-3 g-3">
            <div class="col-md-4">
                <div class="col-box-1 shadow-sm d-flex align-items-center justify-content-center">
                    <h2>Column 1</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="col-box-2 shadow-sm d-flex align-items-center justify-content-center">
                    <h2>Column 2</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="col-box-3 shadow-sm d-flex align-items-center justify-content-center">
                    <h2>Column 3</h2>
                </div>
            </div>
        </div>

        <!-- Footer Row -->
        <div class="row">
            <div class="col-12">
                <div class="footer-box shadow-sm">
                    <h3>Footer</h3>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
